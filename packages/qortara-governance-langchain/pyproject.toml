[project]
name = "qortara-governance-langchain"
version = "0.2.1"
description = "Qortara Governance — LangChain/LangGraph dispatch-path enforcement SDK. Bypass-resistant BaseTool/ToolNode interception routed into Microsoft AGT's in-process policy engine; optional remote sidecar + hosted Azure decision service."
authors = [{ name = "MythologIQ Labs", email = "team@mythologiq.studio" }]
license = { text = "Apache-2.0" }
readme = "README.md"
requires-python = ">=3.11"
keywords = ["langchain", "governance", "policy", "trust", "agents", "ai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "langchain-core>=0.3",
    "httpx>=0.28",
    "opentelemetry-api>=1.30",
    "qortara-protocol==0.1.2",
    # AGT foundation (ADR-0001): library components only — the `[full]` extra
    # pulls `-cli` (operator tool) which requires Python>=3.11 and would drop
    # our 3.10 support. core+protocols+integrations = full library capability.
    "agent-governance-toolkit-core==4.0.0",
    "agent-governance-toolkit-protocols==4.0.0",
    "agent-governance-toolkit-integrations==4.0.0",
]

[project.optional-dependencies]
langgraph = ["langgraph>=0.2"]
dev = ["pytest>=9.0.3", "pytest-asyncio>=1.3.0", "mypy>=1.17", "ruff>=0.8"]

[project.urls]
Homepage = "https://qortara.com/governance"
Repository = "https://github.com/MythologIQ-Labs-LLC/qortara-governance"
Issues = "https://github.com/MythologIQ-Labs-LLC/qortara-governance/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qortara_governance"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
plugins = ["pydantic.mypy"]

# qortara-protocol 0.1.0 ships without a py.typed marker; allow the missing
# stubs until 0.1.1+ adds the marker. Retained at 0.1.2 pending operator
# confirmation that the PyPI-published protocol wheel ships py.typed.
[[tool.mypy.overrides]]
module = "qortara_protocol.*"
ignore_missing_imports = true

# Microsoft AGT (agent-governance-toolkit-core 4.0.0) ships without a py.typed
# marker; allow the missing stubs for the in-process decision-engine import.
[[tool.mypy.overrides]]
module = "agent_control_plane.*"
ignore_missing_imports = true
