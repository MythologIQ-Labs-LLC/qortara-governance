name: Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/qortara-governance-langchain
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        run: uv sync --all-extras --python 3.12

      # --- BLOCKING gates (baseline triaged clean; see Phase 16 / GAP-CI-01) ---
      # Audit the SYNCED project venv (not an isolated tool env), so real
      # dependencies are checked. For a future unfixable transitive advisory,
      # add `--ignore-vuln GHSA-xxxx` here with a tracking note.
      - name: Dependency audit (pip-audit)
        run: uv run --with pip-audit pip-audit

      - name: SAST (bandit)
        run: uv tool run bandit -r src -ll

      # SBOM is artifact generation, not a security finding — kept non-blocking
      # on purpose so a CycloneDX tooling hiccup never fails the build.
      - name: SBOM (CycloneDX)
        run: |
          uv tool run --from cyclonedx-bom cyclonedx-py environment -o sbom.cdx.json || \
          uv tool run --from cyclonedx-bom cyclonedx-py -o sbom.cdx.json || true

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: packages/qortara-governance-langchain/sbom.cdx.json
          if-no-files-found: ignore

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # HARD gate: fails the PR on any detected secret.
      # Use the gitleaks BINARY (Apache-2.0) directly — the gitleaks-action
      # wrapper requires a paid license for organization repos.
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          # Pinned SHA256 of gitleaks_${VERSION}_linux_x64.tar.gz from the release
          # checksums.txt. Bumping VERSION REQUIRES updating this digest (GAP-CI-02).
          SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSL -o "${TARBALL}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${TARBALL}"
          echo "${SHA256}  ${TARBALL}" | sha256sum -c -   # aborts on mismatch
          tar -xzf "${TARBALL}" gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Secret scan (gitleaks)
        run: gitleaks detect --source . --no-git --redact --verbose --exit-code 1
