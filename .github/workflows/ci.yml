name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        package:
          - qortara-governance-langchain
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install package
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv tool run ruff check .

      - name: Format check (ruff)
        run: uv tool run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Unit tests
        run: uv run pytest -q

  # Verifies the lower bound of the documented compatibility matrix (B3): the
  # full suite must pass against the langchain-core floor we claim (>=0.3), not
  # only the latest resolved version. See docs/COMPATIBILITY.md.
  compat-floor:
    name: compat (langchain-core 0.3 floor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/qortara-governance-langchain
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install package
        run: uv sync --all-extras --python 3.11

      - name: Unit tests against the langchain-core / langgraph floor
        run: >
          uv run --python 3.11
          --with "langchain-core>=0.3,<0.4"
          --with "langgraph>=0.2,<0.3"
          pytest -q
