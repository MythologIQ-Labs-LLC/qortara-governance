name: Release

on:
  push:
    tags:
      - 'qortara-governance-langchain-v*'
      - 'v*'  # legacy: pre-monorepo tags map to qortara-governance-langchain

jobs:
  build-and-publish-langchain:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # PyPI trusted publishing via OIDC
      contents: read
    defaults:
      run:
        working-directory: packages/qortara-governance-langchain
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel + sdist
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/qortara-governance-langchain/dist/
          skip-existing: true
