name: Compliance

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install qor-logic
        # Pinned for supply-chain reproducibility of a HARD gate (GAP-M-12).
        # Bump deliberately when adopting a new qor-logic release.
        run: uv tool install qor-logic==0.106.0

      # HARD gate: fails on any DAMAGED / INCOMPLETE governance artifact.
      - name: Governance health
        run: qor-logic governance-health --profile skill-entry

      # HARD gate: Merkle ledger chain integrity.
      - name: Verify ledger chain
        run: qor-logic verify-ledger

      # Report-only: NIST SSDF practice coverage + AI-Act/SSDF surface.
      - name: Compliance report (NIST SSDF / EU AI Act)
        run: qor-logic compliance report || true
